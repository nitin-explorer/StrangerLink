services:
  redis:
    image: redis/redis-stack-server:7.2.0-v9
    container_name: strangerlink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: strangerlink-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://postgres:86e3a7832ca51b169c156307b9302cdb@8dpb6euv.us-east.database.insforge.app:5432/insforge?sslmode=require"
      JWT_SECRET: "${JWT_SECRET:-CHANGE_ME_TO_A_STRONG_RANDOM_SECRET}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        NEXT_PUBLIC_INTERNAL_URL: "http://localhost"
        NEXT_PUBLIC_INTERNAL_PORT: "3000"
        NEXT_PUBLIC_EXPRESS_URL: "http://localhost"
        NEXT_PUBLIC_EXPRESS_PORT: "3001"
        REDIS_HOST: redis
        REDIS_PORT: 6379
    container_name: strangerlink-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:86e3a7832ca51b169c156307b9302cdb@8dpb6euv.us-east.database.insforge.app:5432/insforge?sslmode=require"
      JWT_SECRET: "${JWT_SECRET:-CHANGE_ME_TO_A_STRONG_RANDOM_SECRET}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
